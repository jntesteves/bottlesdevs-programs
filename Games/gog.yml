Name: gog
Description: The official GOG Galaxy launcher.
Grade: Silver
Arch: win64

Dependencies:
- vcredist2022
- allfonts

Parameters:
  dxvk: true
  vkd3d: true
  sync: fsync
  discrete_gpu: true
  
Executable:
  name: GOG Galaxy
  icon: gog.svg
  file: GalaxyClient.exe
  path: Program Files/GOG Galaxy/GalaxyClient.exe
  arguments: --in-process-gpu /runWithoutUpdating /deelevated
  
Steps:
- action: install_exe
  file_name: setup_galaxy_2.1.6.29.exe
  url: https://content-system.gog.com/open_link/download?path=/open/galaxy/client/setup_galaxy_2.1.6.29.exe
  file_checksum: c5d0fdc6a6ccb5144dda4507c2f469d8
  arguments: /s
